version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant_voice_db:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  tts-api:
    build:
      context: ./src/tts-service
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENGINE_TYPE=xtts
      - QDRANT_URL=http://qdrant:6333
      - HF_HOME=/app/models/hf_cache
    volumes:
      - ./data/audio_cache:/app/data/audio_cache
      - ./data/voice_samples:/app/data/voice_samples
      - ./models:/app/models
      - ./src/tts-service:/app
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  tts-worker:
    build:
      context: ./src/tts-service
    command: rq worker tts_queue --url redis://redis:6379/0
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENGINE_TYPE=xtts
      - QDRANT_URL=http://qdrant:6333
      - HF_HOME=/app/models/hf_cache
    volumes:
      - ./data/audio_cache:/app/data/audio_cache
      - ./data/voice_samples:/app/data/voice_samples
      - ./models:/app/models
      - ./src/tts-service:/app
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  redis_data:
