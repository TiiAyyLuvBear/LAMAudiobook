version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  tts-api:
    build:
      context: ./src/tts-service
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENGINE_TYPE=vieneu
    volumes:
      - ./data/audio_cache:/app/data/audio_cache
      - ./data/voice_samples:/app/data/voice_samples
    depends_on:
      - redis

  tts-worker:
    build:
      context: ./src/tts-service
    command: rq worker tts_queue --url redis://redis:6379/0
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENGINE_TYPE=vieneu
    volumes:
      - ./data/audio_cache:/app/data/audio_cache
      - ./data/voice_samples:/app/data/voice_samples
    depends_on:
      - redis

volumes:
  redis_data:
